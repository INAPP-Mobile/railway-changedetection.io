<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f1923"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative grid lines -->
  <g stroke="#1e2d4a" stroke-width="1" opacity="0.4">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Eye icon (centered left) -->
  <ellipse cx="350" cy="315" rx="100" ry="75" fill="none" stroke="url(#accent)" stroke-width="6"/>
  <circle cx="350" cy="315" r="45" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>
  <circle cx="350" cy="315" r="20" fill="#00d4ff"/>
  <circle cx="340" cy="305" r="7" fill="rgba(255,255,255,0.4)"/>
  <!-- Pulse rings -->
  <circle cx="350" cy="315" r="60" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.3">
    <animate attributeName="r" from="60" to="130" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.3" to="0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Title -->
  <text x="520" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="1">changedetection.io</text>
  <text x="520" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#8892b0" letter-spacing="2">Self-hosted web page change monitoring</text>
  <!-- Feature boxes -->
  <g transform="translate(520, 380)">
    <rect x="0" y="0" width="170" height="80" rx="12" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="85" y="30" text-anchor="middle" font-family="system-ui" font-size="13" fill="#00d4ff" font-weight="600">REAL-TIME</text>
    <text x="85" y="52" text-anchor="middle" font-family="system-ui" font-size="11" fill="#8892b0">Instant change alerts</text>
    
    <rect x="190" y="0" width="170" height="80" rx="12" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="275" y="30" text-anchor="middle" font-family="system-ui" font-size="13" fill="#00d4ff" font-weight="600">NOTIFICATIONS</text>
    <text x="275" y="52" text-anchor="middle" font-family="system-ui" font-size="11" fill="#8892b0">Discord, Email, Slack +60</text>
    
    <rect x="380" y="0" width="170" height="80" rx="12" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.3"/>
    <text x="465" y="30" text-anchor="middle" font-family="system-ui" font-size="13" fill="#00d4ff" font-weight="600">AI-POWERED</text>
    <text x="465" y="52" text-anchor="middle" font-family="system-ui" font-size="11" fill="#8892b0">Smart diff summaries</text>
  </g>
  <!-- Railway deploy badge (visual) -->
  <g transform="translate(520, 500)">
    <rect x="0" y="0" width="300" height="46" rx="23" fill="#6C3FC5" opacity="0.9"/>
    <text x="150" y="29" text-anchor="middle" font-family="system-ui" font-size="19" font-weight="700" fill="#ffffff">Deploy on Railway ➜</text>
  </g>
  <!-- Footer -->
  <text x="1200" y="600" text-anchor="end" font-family="system-ui" font-size="13" fill="#4a5568">Deploy your own change detection service in minutes</text>
</svg>
