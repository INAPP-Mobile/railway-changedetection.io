<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#6C3FC5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Large eye / monitoring -->
  <g transform="translate(400,400)">
    <ellipse cx="0" cy="0" rx="200" ry="130" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="65" fill="#00D4FF"/>
    <circle cx="0" cy="0" r="40" fill="#6C3FC5"/>
    <circle cx="-18" cy="-18" r="14" fill="#FFFFFF"/>
    <circle cx="-10" cy="-10" r="7" fill="#FFFFFF"/>
    <!-- Radar arcs -->
    <path d="M-100,-80 Q0,-180 100,-80" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.4"/>
    <path d="M-70,-50 Q0,-130 70,-50" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.3"/>
  </g>
</svg>