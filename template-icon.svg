<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="eye" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="800" rx="160" fill="url(#bg)"/>
  <!-- Eye shape (outer) -->
  <ellipse cx="400" cy="400" rx="200" ry="150" fill="none" stroke="url(#eye)" stroke-width="12"/>
  <!-- Iris -->
  <circle cx="400" cy="400" r="90" fill="url(#eye)" opacity="0.3"/>
  <!-- Pupil -->
  <circle cx="400" cy="400" r="40" fill="#00d4ff"/>
  <!-- Pupil highlight -->
  <circle cx="380" cy="380" r="15" fill="rgba(255,255,255,0.4)"/>
  <!-- Change detection "pulse" rings -->
  <circle cx="400" cy="400" r="120" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4">
    <animate attributeName="r" from="120" to="200" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.4" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="400" r="120" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4">
    <animate attributeName="r" from="120" to="200" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.4" to="0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <!-- Notification dots (signals) -->
  <circle cx="620" cy="320" r="12" fill="#00d4ff">
    <animate attributeName="r" values="12;16;12" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="400" r="8" fill="#00d4ff" opacity="0.6">
    <animate attributeName="r" values="8;12;8" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="470" r="6" fill="#00d4ff" opacity="0.3"/>
  <!-- Label text -->
  <text x="400" y="630" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#00d4ff" letter-spacing="2">change</text>
  <text x="400" y="680" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#8892b0" letter-spacing="4">DETECTION</text>
</svg>
