<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0A0A1A"/><stop offset="100%" stop-color="#040410"/></linearGradient>
    <linearGradient id="eye" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#0077B6"/></linearGradient>
    <linearGradient id="pupil" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0077B6"/><stop offset="100%" stop-color="#6C3FC5"/></linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <circle cx="400" cy="400" r="200" stroke="#00D4FF" stroke-width="1.5" opacity="0.1"/>
  <!-- Eye / monitoring icon -->
  <g transform="translate(400,400)">
    <!-- Outer eye shape -->
    <path d="M-180,0 Q-180,-100 0,-120 Q180,-100 180,0 Q180,100 0,120 Q-180,100 -180,0 Z" fill="url(#eye)" opacity="0.6"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="55" fill="url(#pupil)" opacity="0.8"/>
    <circle cx="0" cy="0" r="35" fill="#0A0A1A" opacity="0.7"/>
    <!-- Highlight -->
    <circle cx="-15" cy="-15" r="12" fill="#FFFFFF" opacity="0.2"/>
    <circle cx="-10" cy="-10" r="6" fill="#FFFFFF" opacity="0.3"/>
    <!-- Radar arcs -->
    <path d="M-80,-80 Q0,-160 80,-80" stroke="#00D4FF" stroke-width="3" fill="none" opacity="0.15"/>
    <path d="M-60,-60 Q0,-130 60,-60" stroke="#00D4FF" stroke-width="2" fill="none" opacity="0.12"/>
  </g>
</svg>